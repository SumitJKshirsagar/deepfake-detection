apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: deepfake-detection-hpa
  namespace: deepfake-detection
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deepfake-detection
  minReplicas: 2               # always keep 2 pods running
  maxReplicas: 10              # scale up to 10 under heavy load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # scale up when memory > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30     # react quickly to spikes
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
