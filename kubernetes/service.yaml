apiVersion: v1
kind: Service
metadata:
  name: deepfake-detection-service
  namespace: deepfake-detection
  labels:
    app: deepfake-detection
spec:
  type: LoadBalancer           # exposes a public IP from GKE
  selector:
    app: deepfake-detection
  ports:
    - name: http
      protocol: TCP
      port: 80                 # external port
      targetPort: 5000         # internal Flask port
